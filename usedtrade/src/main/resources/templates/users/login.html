<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{::pageScripts})}"
>
  <th:block th:fragment="content">
    <div class="app">
      <div class="wrap">
        <!-- 로그인 박스 -->
        <section class="auth-box">
          <div class="auth-header">
            <h2>로그인</h2>
            <p class="subtitle">로그인 후 다양한 중고 물품을 확인하세요!</p>
          </div>

          <form th:action="@{/users/login}" method="post" class="product-form">
            <!--  로그인 실패 메시지 -->
            <div th:if="${param.error}" style="color: red; margin-bottom: 10px">
              아이디 또는 비밀번호가 틀렸습니다.
            </div>

            <!-- 아이디 -->
            <label class="row">
              <span>아이디</span>
              <input
                type="text"
                name="username"
                placeholder="아이디를 입력하세요"
                autocomplete="username"
                required
              />
            </label>

            <!-- 비밀번호 -->
            <label class="row">
              <span>비밀번호</span>
              <input
                type="password"
                name="password"
                placeholder="비밀번호를 입력하세요"
                autocomplete="current-password"
                required
              />
            </label>

            <!-- 로그인 버튼 -->
            <div class="button-group" style="margin-top: 20px">
              <button
                type="submit"
                class="search-button"
                style="
                  width: 100%;
                  height: 50px;
                  font-size: 16px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  padding: 0;
                  line-height: 1;
                "
              >
                로그인
              </button>
            </div>

            <!-- 회원가입 이동 -->
            <p
              style="
                text-align: center;
                margin-top: 20px;
                color: #666;
                font-size: 14px;
              "
            >
              아직 회원이 아니신가요?
              <a
                th:href="@{/users/join}"
                style="color: #2563eb; font-weight: 700"
              >
                회원가입하기
              </a>
            </p>
          </form>
        </section>
      </div>
    </div>
  </th:block>

  <th:block th:fragment="pageScripts"> </th:block>
</html>
