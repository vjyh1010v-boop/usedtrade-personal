<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: layout(~{::content}, ~{::pageScripts})}"
>
  <th:block th:fragment="content">
    <div class="app">
      <div class="wrap">
        <section class="auth-box">
          <div class="auth-header">
            <h2>회원가입</h2>
            <p class="subtitle">새로운 가족이 되어주세요!</p>
          </div>

          <form
            id="joinForm"
            th:action="@{/users/join}"
            th:object="${userJoinForm}"
            method="POST"
            class="product-form"
          >
            <!-- 전체 에러 메시지 -->
            <div th:if="${#fields.hasGlobalErrors()}" class="error-box">
              <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
            </div>

            <label class="row">
              <span>아이디</span>
              <input
                type="text"
                name="loginId"
                th:field="*{loginId}"
                placeholder="사용할 아이디를 입력하세요"
              />
              <p
                class="field-error"
                th:if="${#fields.hasErrors('loginId')}"
                th:errors="*{loginId}"
              ></p>
            </label>

            <!-- 비밀번호 -->
            <label class="row">
              <span>비밀번호</span>
              <input
                type="password"
                th:field="*{password}"
                id="userPassword"
                name="password"
                placeholder="비밀번호를 입력하세요"
              />
              <p
                class="field-error"
                th:if="${#fields.hasErrors('password')}"
                th:errors="*{password}"
              ></p>
            </label>

            <!-- 비밀번호 확인 -->
            <label class="row">
              <span>비밀번호 확인</span>
              <input
                type="password"
                th:field="*{passwordConfirm}"
                id="passwordConfirm"
                placeholder="비밀번호를 한 번 더 입력하세요"
              />
              <p
                class="field-error"
                th:if="${#fields.hasErrors('passwordConfirm')}"
                th:errors="*{passwordConfirm}"
              ></p>
            </label>

            <!-- 이름 -->
            <label class="row">
              <span>이름</span>
              <input
                type="text"
                th:field="*{userName}"
                name="userName"
                placeholder="성함을 입력하세요"
              />
              <p
                class="field-error"
                th:if="${#fields.hasErrors('userName')}"
                th:errors="*{userName}"
              ></p>
            </label>

            <!-- 닉네임 -->
            <label class="row">
              <span>닉네임</span>
              <input
                type="text"
                th:field="*{nickname}"
                name="nickname"
                placeholder="활동할 별명을 입력하세요"
              />
              <p
                class="field-error"
                th:if="${#fields.hasErrors('nickname')}"
                th:errors="*{nickname}"
              ></p>
            </label>

            <!-- 전화번호 -->
            <label class="row">
              <span>전화번호</span>
              <input
                type="tel"
                th:field="*{phone}"
                name="phone"
                placeholder="예: 010-1234-5678"
              />
              <p
                class="field-error"
                th:if="${#fields.hasErrors('phone')}"
                th:errors="*{phone}"
              ></p>
            </label>

            <div class="button-group" style="margin-top: 20px">
              <button
                type="submit"
                class="search-button"
                style="
                  width: 100%;
                  height: 50px;
                  font-size: 16px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  padding: 0;
                  line-height: 1;
                "
              >
                가입 완료
              </button>
            </div>
            <p
              style="
                text-align: center;
                margin-top: 20px;
                color: #666;
                font-size: 14px;
              "
            >
              이미 계정이 있으신가요?
              <a
                th:href="@{/users/login}"
                style="color: #2563eb; font-weight: 700"
                >로그인하기</a
              >
            </p>
          </form>
        </section>
      </div>
    </div>
  </th:block>

  <th:block th:fragment="pageScripts">
    <script>
      // 간단한 비밀번호 일치 확인 스크립트
      document
        .getElementById("joinForm")
        .addEventListener("submit", function (e) {
          const password = document.getElementById("userPassword").value;
          const confirm = document.getElementById("passwordConfirm").value;

          if (password !== confirm) {
            e.preventDefault();
            alert("비밀번호가 서로 일치하지 않습니다. 다시 확인해주세요.");
          }
        });
    </script>
  </th:block>
</html>
